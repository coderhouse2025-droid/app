<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GastoApp Pro</title>

<!-- PWA + ICONOS -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e293b">
<link rel="icon" sizes="192x192" href="icon-192.png">
<link rel="icon" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- LIBS -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

</head>

<body class="bg-slate-100 font-sans">

<!-- NAVBAR -->
<nav class="bg-white shadow px-4 py-3 flex justify-between items-center">
  <div class="flex items-center gap-3">
    <img src="icon-192.png" style="width:38px;height:38px;border-radius:10px;background:#1e293b;padding:4px;object-fit:contain;">
    <div>
      <h1 class="font-bold text-lg">GastoApp Pro</h1>
      <p class="text-xs text-gray-400">CONTROL DE PRESUPUESTO</p>
    </div>
  </div>

  <button onclick="exportPDF()" class="bg-slate-800 text-white px-3 py-1 rounded text-sm">
    Exportar PDF
  </button>
</nav>

<main class="p-6 space-y-6">

<!-- RESUMEN -->
<div class="bg-white p-6 rounded-xl shadow">
  <p class="text-gray-500 text-sm">Balance disponible</p>
  <h2 id="balance" class="text-3xl font-bold">$0</h2>
</div>

<!-- FORMULARIO -->
<div class="bg-white p-6 rounded-xl shadow">
  <h3 class="font-bold mb-3">Nuevo Registro</h3>

  <input id="desc" placeholder="Descripción" class="w-full mb-2 p-2 border rounded">
  <input id="amount" type="number" placeholder="Monto" class="w-full mb-2 p-2 border rounded">

  <select id="type" class="w-full mb-2 p-2 border rounded">
    <option value="Ingreso">Ingreso</option>
    <option value="Gasto">Gasto</option>
  </select>

  <button onclick="addItem()" class="bg-green-600 text-white px-3 py-1 rounded">Agregar</button>
</div>

<!-- LISTA -->
<div class="bg-white p-6 rounded-xl shadow">
  <h3 class="font-bold mb-3">Historial</h3>
  <ul id="list"></ul>
</div>

</main>

<script>
let db = JSON.parse(localStorage.getItem('db') || '[]');

function save(){
  localStorage.setItem('db', JSON.stringify(db));
  render();
}

function addItem(){
  const desc = document.getElementById('desc').value;
  const amount = parseFloat(document.getElementById('amount').value);
  const type = document.getElementById('type').value;

  if(!desc || !amount) return;

  db.push({desc, amount, type});
  save();
}

function render(){
  const list = document.getElementById('list');
  list.innerHTML = '';

  let balance = 0;

  db.forEach((x,i)=>{
    balance += x.type==='Ingreso'? x.amount : -x.amount;

    const li = document.createElement('li');
    li.className = 'flex justify-between mb-1';
    li.innerHTML = `${x.desc} <span>${x.type==='Ingreso'?'+':'-'}$${x.amount}</span>`;
    list.appendChild(li);
  });

  document.getElementById('balance').innerText = '$'+balance;
}

// BASE64 IMAGE
function getBase64Image(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'Anonymous';

    img.onload = function () {
      const canvas = document.createElement('canvas');
      canvas.width = this.width;
      canvas.height = this.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(this, 0, 0);
      resolve(canvas.toDataURL('image/png'));
    };

    img.onerror = reject;
    img.src = url;
  });
}

// EXPORT PDF
async function exportPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const imgData = await getBase64Image('icon-192.png');

  doc.setFillColor(30,41,59);
  doc.roundedRect(10,6,26,26,4,4,'F');

  doc.addImage(imgData,'PNG',12,8,22,22);

  doc.setFontSize(16);
  doc.text('GastoApp Pro',42,18);
  doc.setFontSize(10);
  doc.text('CONTROL DE PRESUPUESTO',42,25);

  let y = 50;

  db.forEach(x=>{
    doc.text(`${x.desc} - $${x.amount}`,14,y);
    y+=6;
  });

  doc.save('reporte.pdf');
}

// SERVICE WORKER
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}

render();
</script>

</body>
</html>
